<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"href="registration form.css">
</head>
<body>
 <h2>Student Registration</h2> 
 <form>
    name:
    <br>
    <input type="text"place holder="Enter your name">
    <br></br>
    Email:
    <br>
    <input type="email"place holder="Enter your Email">
    <br></br>
    password:
    <br>
    <input type="password"place holder="Enter your password">
    <br></br>
    Gender:
    <br>
    <input type="Radio"place holder="gender">male
    <br>
    <input type="Radio"place holder="gender">female
    <br>
    <input type="Radio"place holder="gender">others
    <br></br>
    Skills:
    <br>
    <input type="checkbox">html
    <br>
    <input type="checkbox">css
    <br>
    <input type="checkbox">javascript
    <br></br>
    message:
    <br>
    <textarea rows="4" cols="30" placeholder="write your message"></textarea>
     <br></br>
     submit:
     <br>
     <input type="submit">
     <br></br>
 </form>  
</body>
</html>
